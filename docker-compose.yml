version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./fbs.db:/app/fbs.db
      - ./registro:/app/registro
    environment:
      - FBS_DB_PATH=/app/fbs.db
      - FBS_HISTORIAL_PATH=/app/registro/historial.jsonl
      - JWT_SECRET=${JWT_SECRET:-fbs-dev-secret-key-cambiar-en-produccion}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
